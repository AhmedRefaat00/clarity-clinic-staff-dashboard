<div class="login-wrapper">
  <!-- Top Settings Bar -->
  <div class="login-header-actions">
    <!-- Logo (Only shown at top left matching user's image) -->
    <div class="logo-container">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.5 16.5c-1.5-1.25-2.5-3-2.5-5 0-3.87 3.13-7 7-7s7 3.13 7 7c0 2-1 3.75-2.5 5"></path>
          <path d="M12 12v9"></path>
          <path d="M9 18l3 3 3-3"></path>
        </svg>
      </div>
      <span class="logo-text">Clarity Clinic</span>
    </div>

    <div class="actions-right">
      <!-- Theme Switcher -->
      <button type="button" class="action-btn" (click)="toggleTheme()" [title]="isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
        @if (isDarkMode()) {
          <!-- Sun icon -->
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
          </svg>
        }
      </button>

      <!-- Language Selector -->
      <button type="button" class="action-btn lang-btn" (click)="toggleLanguage()" title="Change Language">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <span class="lang-text">{{ currentLang() === 'en' ? 'ع' : 'EN' }}</span>
      </button>
    </div>
  </div>

  <!-- Sign In Card -->
  <div class="login-card">
    <div class="card-header">
      <h1>{{ currentLang() === 'en' ? 'Staff sign in' : 'تسجيل دخول الموظفين' }}</h1>
      <p class="subtitle">{{ currentLang() === 'en' ? 'Sign in to the clinic dashboard.' : 'سجل الدخول إلى لوحة تحكم العيادة.' }}</p>
    </div>

    <!-- Error Alert -->
    @if (errorMessage) {
      <div class="error-alert">
        <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>
    }

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <div class="form-group">
        <label for="email">{{ currentLang() === 'en' ? 'Email' : 'البريد الإلكتروني' }}</label>
        <div class="input-wrapper">
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="email" 
            required 
            #emailInput="ngModel"
            [placeholder]="currentLang() === 'en' ? 'admin@clinic.local' : 'admin@clinic.local'"
            [class.invalid]="emailInput.touched && emailInput.invalid"
            [disabled]="isSubmitting"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">{{ currentLang() === 'en' ? 'Password' : 'كلمة المرور' }}</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            required 
            #passwordInput="ngModel"
            [placeholder]="currentLang() === 'en' ? '••••••••' : '••••••••'"
            [class.invalid]="passwordInput.touched && passwordInput.invalid"
            [disabled]="isSubmitting"
          />
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isSubmitting || loginForm.invalid">
        @if (isSubmitting) {
          <span class="spinner"></span>
        } @else {
          {{ currentLang() === 'en' ? 'Sign in' : 'تسجيل الدخول' }}
        }
      </button>
    </form>
  </div>
</div>
