<div class="services-container">
  <header class="services-header">
    <div class="header-left">
      <h1 class="services-title">Services</h1>
      <p class="services-subtitle">Bookable services per doctor.</p>
    </div>
    <button class="add-service-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Add service
    </button>
  </header>

  <div class="table-responsive">
    <table class="services-table">
      <thead>
        <tr>
          <th>NAME</th>
          <th>DOCTOR</th>
          <th>DURATION</th>
          <th>PRICE</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (service of services(); track service.id) {
          <tr>
            <td>
              <span class="service-name">{{ service.name }}</span>
            </td>
            <td>
              <span class="service-doctor">{{ service.doctorName || '—' }}</span>
            </td>
            <td>
              <span class="service-duration">{{ service.durationMinutes }} min</span>
            </td>
            <td>
              <span class="service-price">{{ service.price }} EGP</span>
            </td>
            <td class="actions-cell">
              <button class="action-icon-btn" title="Edit Service">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
              </button>
              <button class="action-icon-btn delete-btn" title="Delete Service">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
